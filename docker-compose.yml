version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - ./Backend:/app/backend
      - /app/backend/node_modules
    command: npm start

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE=http://localhost:5000/api
    volumes:
      - ./Frontend:/app/frontend
      - /app/frontend/node_modules

volumes:
  db:
